target-version = "py312"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "B008",  # Depends() en defaults — patrón estándar de FastAPI
    "B904",  # raise-without-from: aceptable en handlers HTTP donde el contexto original no aporta
    "E501",  # líneas largas — manejado por el formatter
    "UP042", # StrEnum: cambio de comportamiento en serialización Pydantic, se revisa con upgrade
    "UP046", # PEP 695 generics: Pydantic no soporta aún la nueva sintaxis class Foo[T]
]

[lint.isort]
known-first-party = ["app"]

[format]
quote-style = "double"
indent-style = "space"
