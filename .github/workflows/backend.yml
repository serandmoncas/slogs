name: Backend CI

on:
  push:
    branches: [main]
    paths: ["backend/**"]
  pull_request:
    branches: [main]
    paths: ["backend/**"]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: slogs
          POSTGRES_PASSWORD: slogs_dev
          POSTGRES_DB: slogs_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://slogs:slogs_dev@localhost:5432/slogs_db
      TEST_DATABASE_URL: postgresql://slogs:slogs_dev@localhost:5432/slogs_test
      SECRET_KEY: ci-secret-not-used-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CORS_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Create test database
        env:
          PGPASSWORD: slogs_dev
        run: psql -h localhost -U slogs -d slogs_db -c "CREATE DATABASE slogs_test;"

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run pytest
        working-directory: backend
        run: pytest tests/ -v --tb=short
