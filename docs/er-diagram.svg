<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 860" font-family="'Courier New', monospace">
  <rect width="1280" height="860" fill="#0B1220"/>
  <defs>
    <marker id="fk" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 Z" fill="#60A5FA"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="640" y="36" text-anchor="middle" fill="#F59E0B" font-size="18" font-weight="bold">SLOGS — Diagrama Entidad-Relación</text>

  <!-- ─── users ─────────────────────────────────── -->
  <g transform="translate(40,60)">
    <rect width="210" height="220" rx="6" fill="#0E1626" stroke="#F59E0B" stroke-width="1.5"/>
    <rect width="210" height="28" rx="6" fill="#F59E0B"/>
    <rect y="6" width="210" height="22" fill="#F59E0B"/>
    <text x="105" y="19" text-anchor="middle" fill="#0B1220" font-size="12" font-weight="bold">users</text>
    <line x1="0" y1="28" x2="210" y2="28" stroke="#F59E0B" stroke-width="1"/>
    <text x="10" y="46" fill="#F59E0B" font-size="10">🔑 id SERIAL PK</text>
    <text x="10" y="62" fill="#F1F5F9" font-size="10">email VARCHAR(255) UNIQUE</text>
    <text x="10" y="78" fill="#94A3B8" font-size="10">hashed_password VARCHAR</text>
    <text x="10" y="94" fill="#F1F5F9" font-size="10">nombre VARCHAR(100)</text>
    <text x="10" y="110" fill="#F1F5F9" font-size="10">rol VARCHAR(50)</text>
    <text x="10" y="126" fill="#F1F5F9" font-size="10">is_active BOOLEAN</text>
    <text x="10" y="142" fill="#94A3B8" font-size="10">created_at TIMESTAMPTZ</text>
    <text x="10" y="158" fill="#94A3B8" font-size="10">updated_at TIMESTAMPTZ</text>
  </g>

  <!-- ─── clientes ──────────────────────────────── -->
  <g transform="translate(280,60)">
    <rect width="210" height="236" rx="6" fill="#0E1626" stroke="#60A5FA" stroke-width="1.5"/>
    <rect width="210" height="28" rx="6" fill="#60A5FA"/>
    <rect y="6" width="210" height="22" fill="#60A5FA"/>
    <text x="105" y="19" text-anchor="middle" fill="#0B1220" font-size="12" font-weight="bold">clientes</text>
    <line x1="0" y1="28" x2="210" y2="28" stroke="#60A5FA" stroke-width="1"/>
    <text x="10" y="46" fill="#F59E0B" font-size="10">🔑 id SERIAL PK</text>
    <text x="10" y="62" fill="#F1F5F9" font-size="10">nombre VARCHAR(150)</text>
    <text x="10" y="78" fill="#F1F5F9" font-size="10">nit VARCHAR(20) UNIQUE</text>
    <text x="10" y="94" fill="#F1F5F9" font-size="10">email VARCHAR(255)</text>
    <text x="10" y="110" fill="#F1F5F9" font-size="10">telefono VARCHAR(20)</text>
    <text x="10" y="126" fill="#F1F5F9" font-size="10">direccion VARCHAR(255)</text>
    <text x="10" y="142" fill="#F1F5F9" font-size="10">ciudad VARCHAR(100)</text>
    <text x="10" y="158" fill="#94A3B8" font-size="10">created_at TIMESTAMPTZ</text>
    <text x="10" y="174" fill="#94A3B8" font-size="10">updated_at TIMESTAMPTZ</text>
  </g>

  <!-- ─── productos ─────────────────────────────── -->
  <g transform="translate(520,60)">
    <rect width="210" height="188" rx="6" fill="#0E1626" stroke="#60A5FA" stroke-width="1.5"/>
    <rect width="210" height="28" rx="6" fill="#60A5FA"/>
    <rect y="6" width="210" height="22" fill="#60A5FA"/>
    <text x="105" y="19" text-anchor="middle" fill="#0B1220" font-size="12" font-weight="bold">productos</text>
    <line x1="0" y1="28" x2="210" y2="28" stroke="#60A5FA" stroke-width="1"/>
    <text x="10" y="46" fill="#F59E0B" font-size="10">🔑 id SERIAL PK</text>
    <text x="10" y="62" fill="#F1F5F9" font-size="10">nombre VARCHAR(150)</text>
    <text x="10" y="78" fill="#94A3B8" font-size="10">descripcion TEXT</text>
    <text x="10" y="94" fill="#F1F5F9" font-size="10">categoria VARCHAR(100)</text>
    <text x="10" y="110" fill="#94A3B8" font-size="10">created_at TIMESTAMPTZ</text>
    <text x="10" y="126" fill="#94A3B8" font-size="10">updated_at TIMESTAMPTZ</text>
  </g>

  <!-- ─── bodegas ───────────────────────────────── -->
  <g transform="translate(760,60)">
    <rect width="210" height="204" rx="6" fill="#0E1626" stroke="#4ADE80" stroke-width="1.5"/>
    <rect width="210" height="28" rx="6" fill="#4ADE80"/>
    <rect y="6" width="210" height="22" fill="#4ADE80"/>
    <text x="105" y="19" text-anchor="middle" fill="#0B1220" font-size="12" font-weight="bold">bodegas</text>
    <line x1="0" y1="28" x2="210" y2="28" stroke="#4ADE80" stroke-width="1"/>
    <text x="10" y="46" fill="#F59E0B" font-size="10">🔑 id SERIAL PK</text>
    <text x="10" y="62" fill="#F1F5F9" font-size="10">nombre VARCHAR(150)</text>
    <text x="10" y="78" fill="#F1F5F9" font-size="10">ciudad VARCHAR(100)</text>
    <text x="10" y="94" fill="#F1F5F9" font-size="10">direccion VARCHAR(255)</text>
    <text x="10" y="110" fill="#F1F5F9" font-size="10">capacidad INTEGER</text>
    <text x="10" y="126" fill="#F1F5F9" font-size="10">tipo ENUM(NAC,INTL)</text>
    <text x="10" y="142" fill="#94A3B8" font-size="10">created_at TIMESTAMPTZ</text>
    <text x="10" y="158" fill="#94A3B8" font-size="10">updated_at TIMESTAMPTZ</text>
  </g>

  <!-- ─── puertos ───────────────────────────────── -->
  <g transform="translate(1010,60)">
    <rect width="235" height="220" rx="6" fill="#0E1626" stroke="#4ADE80" stroke-width="1.5"/>
    <rect width="235" height="28" rx="6" fill="#4ADE80"/>
    <rect y="6" width="235" height="22" fill="#4ADE80"/>
    <text x="117" y="19" text-anchor="middle" fill="#0B1220" font-size="12" font-weight="bold">puertos</text>
    <line x1="0" y1="28" x2="235" y2="28" stroke="#4ADE80" stroke-width="1"/>
    <text x="10" y="46" fill="#F59E0B" font-size="10">🔑 id SERIAL PK</text>
    <text x="10" y="62" fill="#F1F5F9" font-size="10">nombre VARCHAR(150)</text>
    <text x="10" y="78" fill="#F1F5F9" font-size="10">ciudad VARCHAR(100)</text>
    <text x="10" y="94" fill="#F1F5F9" font-size="10">pais VARCHAR(100)</text>
    <text x="10" y="110" fill="#F1F5F9" font-size="10">codigo VARCHAR(10) UNIQUE</text>
    <text x="10" y="126" fill="#F1F5F9" font-size="10">tipo ENUM(NAC,INTL)</text>
    <text x="10" y="142" fill="#94A3B8" font-size="10">created_at TIMESTAMPTZ</text>
    <text x="10" y="158" fill="#94A3B8" font-size="10">updated_at TIMESTAMPTZ</text>
  </g>

  <!-- ─── envios_terrestres ─────────────────────── -->
  <g transform="translate(40,400)">
    <rect width="570" height="420" rx="6" fill="#0E1626" stroke="#F59E0B" stroke-width="2"/>
    <rect width="570" height="28" rx="6" fill="#92400E"/>
    <rect y="6" width="570" height="22" fill="#92400E"/>
    <text x="285" y="19" text-anchor="middle" fill="#FCD34D" font-size="12" font-weight="bold">envios_terrestres</text>
    <line x1="0" y1="28" x2="570" y2="28" stroke="#F59E0B" stroke-width="1"/>
    <text x="10" y="46" fill="#F59E0B" font-size="10">🔑 id SERIAL PK</text>
    <text x="10" y="62" fill="#F1F5F9" font-size="10">numero_guia VARCHAR(10) UNIQUE INDEX</text>
    <text x="10" y="78" fill="#60A5FA" font-size="10">🔗 cliente_id INTEGER FK → clientes.id</text>
    <text x="10" y="94" fill="#60A5FA" font-size="10">🔗 producto_id INTEGER FK → productos.id</text>
    <text x="10" y="110" fill="#4ADE80" font-size="10">🔗 bodega_id INTEGER FK → bodegas.id</text>
    <text x="10" y="126" fill="#F1F5F9" font-size="10">cantidad INTEGER  (> 0)</text>
    <text x="10" y="142" fill="#F1F5F9" font-size="10">fecha_registro DATE  (auto, no editable)</text>
    <text x="10" y="158" fill="#F1F5F9" font-size="10">fecha_entrega DATE</text>
    <text x="10" y="174" fill="#F1F5F9" font-size="10">precio_envio NUMERIC(12,2)</text>
    <text x="10" y="190" fill="#F59E0B" font-size="10">descuento_pct NUMERIC(4,2)  ← 5% si cant>10</text>
    <text x="10" y="206" fill="#F59E0B" font-size="10">precio_final NUMERIC(12,2)  ← calculado</text>
    <text x="10" y="222" fill="#F1F5F9" font-size="10">placa VARCHAR(6)  regex ^[A-Z]{3}[0-9]{3}$</text>
    <text x="10" y="238" fill="#F1F5F9" font-size="10">estado ENUM(PENDIENTE,EN_TRÁNSITO,ENTREGADO,CANCELADO)</text>
    <text x="10" y="254" fill="#94A3B8" font-size="10">created_at TIMESTAMPTZ</text>
    <text x="10" y="270" fill="#94A3B8" font-size="10">updated_at TIMESTAMPTZ</text>
    <!-- Nota de regla de negocio -->
    <rect x="10" y="285" width="548" height="122" rx="4" fill="#111827" stroke="#F59E0B" stroke-width="0.5" stroke-dasharray="4,3"/>
    <text x="20" y="302" fill="#F59E0B" font-size="9" font-style="italic">Reglas de negocio (service layer):</text>
    <text x="20" y="318" fill="#94A3B8" font-size="9">• descuento_pct = 5.00 si cantidad > 10, else 0.00</text>
    <text x="20" y="334" fill="#94A3B8" font-size="9">• precio_final = precio_envio × (1 - descuento_pct / 100)</text>
    <text x="20" y="350" fill="#94A3B8" font-size="9">• fecha_registro = date.today() — asignado al crear, inmutable</text>
    <text x="20" y="366" fill="#94A3B8" font-size="9">• numero_guia verificado único antes de INSERT → 409 si duplicado</text>
    <text x="20" y="382" fill="#94A3B8" font-size="9">• estado inicial = PENDIENTE (no configurable en creación)</text>
  </g>

  <!-- ─── envios_maritimos ──────────────────────── -->
  <g transform="translate(660,400)">
    <rect width="585" height="420" rx="6" fill="#0E1626" stroke="#60A5FA" stroke-width="2"/>
    <rect width="585" height="28" rx="6" fill="#1E3A5F"/>
    <rect y="6" width="585" height="22" fill="#1E3A5F"/>
    <text x="292" y="19" text-anchor="middle" fill="#93C5FD" font-size="12" font-weight="bold">envios_maritimos</text>
    <line x1="0" y1="28" x2="585" y2="28" stroke="#60A5FA" stroke-width="1"/>
    <text x="10" y="46" fill="#F59E0B" font-size="10">🔑 id SERIAL PK</text>
    <text x="10" y="62" fill="#F1F5F9" font-size="10">numero_guia VARCHAR(10) UNIQUE INDEX</text>
    <text x="10" y="78" fill="#60A5FA" font-size="10">🔗 cliente_id INTEGER FK → clientes.id</text>
    <text x="10" y="94" fill="#60A5FA" font-size="10">🔗 producto_id INTEGER FK → productos.id</text>
    <text x="10" y="110" fill="#4ADE80" font-size="10">🔗 puerto_id INTEGER FK → puertos.id</text>
    <text x="10" y="126" fill="#F1F5F9" font-size="10">cantidad INTEGER  (> 0)</text>
    <text x="10" y="142" fill="#F1F5F9" font-size="10">fecha_registro DATE  (auto, no editable)</text>
    <text x="10" y="158" fill="#F1F5F9" font-size="10">fecha_entrega DATE</text>
    <text x="10" y="174" fill="#F1F5F9" font-size="10">precio_envio NUMERIC(12,2)</text>
    <text x="10" y="190" fill="#60A5FA" font-size="10">descuento_pct NUMERIC(4,2)  ← 3% si cant>10</text>
    <text x="10" y="206" fill="#60A5FA" font-size="10">precio_final NUMERIC(12,2)  ← calculado</text>
    <text x="10" y="222" fill="#F1F5F9" font-size="10">numero_flota VARCHAR(8)  regex ^[A-Z]{3}[0-9]{4}[A-Z]$</text>
    <text x="10" y="238" fill="#F1F5F9" font-size="10">estado ENUM estadoenvio (reutiliza tipo PostgreSQL)</text>
    <text x="10" y="254" fill="#94A3B8" font-size="10">created_at TIMESTAMPTZ</text>
    <text x="10" y="270" fill="#94A3B8" font-size="10">updated_at TIMESTAMPTZ</text>
    <rect x="10" y="285" width="563" height="122" rx="4" fill="#111827" stroke="#60A5FA" stroke-width="0.5" stroke-dasharray="4,3"/>
    <text x="20" y="302" fill="#60A5FA" font-size="9" font-style="italic">Reglas de negocio (service layer):</text>
    <text x="20" y="318" fill="#94A3B8" font-size="9">• descuento_pct = 3.00 si cantidad > 10, else 0.00  (distinto al terrestre)</text>
    <text x="20" y="334" fill="#94A3B8" font-size="9">• precio_final = precio_envio × (1 - descuento_pct / 100)</text>
    <text x="20" y="350" fill="#94A3B8" font-size="9">• fecha_registro = date.today() — asignado al crear, inmutable</text>
    <text x="20" y="366" fill="#94A3B8" font-size="9">• numero_guia verificado único antes de INSERT → 409 si duplicado</text>
    <text x="20" y="382" fill="#94A3B8" font-size="9">• estado inicial = PENDIENTE (no configurable en creación)</text>
  </g>

  <!-- ─── Relation lines ─── -->
  <!-- envios_terrestres.cliente_id → clientes.id -->
  <line x1="380" y1="296" x2="380" y2="478" stroke="#60A5FA" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#fk)"/>
  <text x="384" y="390" fill="#60A5FA" font-size="9">cliente_id</text>

  <!-- envios_terrestres.producto_id → productos.id -->
  <line x1="610" y1="248" x2="610" y2="494" stroke="#60A5FA" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#fk)"/>
  <text x="614" y="380" fill="#60A5FA" font-size="9">producto_id</text>

  <!-- envios_terrestres.bodega_id → bodegas.id -->
  <line x1="865" y1="264" x2="556" y2="510" stroke="#4ADE80" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#fk)"/>
  <text x="730" y="370" fill="#4ADE80" font-size="9">bodega_id</text>

  <!-- envios_maritimos.cliente_id → clientes.id -->
  <line x1="820" y1="296" x2="820" y2="478" stroke="#60A5FA" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#fk)"/>
  <text x="824" y="390" fill="#60A5FA" font-size="9">cliente_id</text>

  <!-- envios_maritimos.producto_id → productos.id -->
  <line x1="625" y1="248" x2="900" y2="494" stroke="#60A5FA" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#fk)"/>
  <text x="750" y="400" fill="#60A5FA" font-size="9">producto_id</text>

  <!-- envios_maritimos.puerto_id → puertos.id -->
  <line x1="1127" y1="280" x2="1100" y2="510" stroke="#4ADE80" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#fk)"/>
  <text x="1108" y="400" fill="#4ADE80" font-size="9">puerto_id</text>

  <!-- Legend -->
  <g transform="translate(40,800)">
    <text x="0" y="0" fill="#94A3B8" font-size="10">Leyenda:</text>
    <text x="70" y="0" fill="#F59E0B" font-size="10">🔑 PK</text>
    <text x="110" y="0" fill="#60A5FA" font-size="10">🔗 FK → referencia</text>
    <line x1="240" y1="-4" x2="280" y2="-4" stroke="#60A5FA" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#fk)"/>
    <text x="285" y="0" fill="#94A3B8" font-size="10">relación N:1</text>
    <text x="380" y="0" fill="#F59E0B" font-size="10">Tablas separadas (no herencia) — decisión de diseño documentada en README</text>
  </g>
</svg>
